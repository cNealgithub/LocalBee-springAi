spring.application.name=springAiTut

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2:latest
spring.ai.ollama.chat.options.temperature=0.7
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
# --- DATABASE ---
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/spring_ai
spring.datasource.username=neal
spring.datasource.password=postgresneal
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

#      SPRING_AI-CHAT_MEMORY
spring.ai.chat.memory.repository.jdbc.initialize-schema=always

# --- JPA ---
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true

#-------VectorDB Config---------------------
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.ollama.embedding.options.model=nomic-embed-text
